- hosts: localhost
  become: yes
  vars:
    - user: 'felix'
    - dotfiles_repo: 'https://github.com/MarchCraft/dotfiles.git'

  tasks:
    - name: log OS family
      debug:
        msg: "OS family is {{ ansible_os_family }}"

    - name: "Check out dotfiles from repository"
      git:
        repo: "{{ dotfiles_repo }}"
        dest: ./tmp-dotfiles
        force: yes
      delegate_to: localhost

    - name: detect OS and load ansible file accordingly
      include_tasks: "{{ item }}"
      with_first_found:
        - "./tmp-dotfiles/{{ ansible_os_family }}.yaml"
        - "./tmp-dotfiles/default.yml"

    - name: "Copy NeoVim config"
      synchronize:
        src: ./tmp-dotfiles/nvim
        dest: "/home/{{ user }}/.config/"

    - name: Install NeoVim plugins
      become: yes
      become_user: felix
      become_method: su
      become_flags: '--login'
      shell: "nvim --headless '+Lazy! sync' +qa"

    - name: "copy Fonts"
      copy:
        src: ./tmp-dotfiles/.fonts
        dest: "/home/{{ user }}/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"

    - name: "copy hyprland config"
      copy:
        src: ./tmp-dotfiles/hypr
        dest: "/home/{{ user }}/.config/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"

    - name: "copy rofi config"
      copy:
        src: ./tmp-dotfiles/rofi
        dest: "/home/{{ user }}/.config"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"

    - name: "copy kitty config"
      copy:
        src: ./tmp-dotfiles/kitty
        dest: "/home/{{ user }}/.config/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"

    - name: "copy swaylock config"
      copy:
        src: ./tmp-dotfiles/swaylock
        dest: "/home/{{ user }}/.config/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"

    - name: "copy waybar config"
      copy:
        src: ./tmp-dotfiles/waybar
        dest: "/home/{{ user }}/.config/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"

    - name: "copy bashrc config"
      copy:
        src: ./tmp-dotfiles/.bashrc
        dest: "/home/{{ user }}/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"

    - name: "copy starship config"
      copy:
        src: ./tmp-dotfiles/starship.toml
        dest: "/home/{{ user }}/.config/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"

    - name: "copy fastfetch config"
      copy:
        src: ./tmp-dotfiles/fastfetch
        dest: "/home/{{ user }}/.config/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"
    - name: "copy bashrc config"
      copy:
        src: ./tmp-dotfiles/.bashrc
        dest: "/home/{{ user }}/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"
    - name: "copy fzf.bash"
      copy:
        src: ./tmp-dotfiles/fzf.bash
        dest: "/home/{{ user }}/.config/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"
