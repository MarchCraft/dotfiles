- hosts: localhost
  vars:
    - user: 'felix'

  tasks:
    - name: log OS family
      debug:
        msg: "OS family is {{ ansible_os_family }}"

    - name: detect OS and load ansible file accordingly
      include_tasks: "{{ item }}"
      with_first_found:
       - "/home/{{user}}/dotfiles/{{ ansible_os_family }}.yaml"
       - "/home/{{user}}/dotfiles/default.yml"

    - name: "install fish"
      become: yes
      package:
        name: fish
        state: present

    - name: "link config files"
      file:
        dest: "/home/{{user}}/.config"
        src: "/home/{{user}}/dotfiles/config/"
        state: link

    - name: Install NeoVim plugins
      become: yes
      become_user: felix
      become_method: su
      become_flags: '--login'
      shell: "nvim --headless '+Lazy! sync' +qa"

    - name: "copy Fonts"
      copy:
        src: /home/{{user}}/dotfiles/.fonts
        dest: "/home/{{ user }}/"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "0644"

    - name: "Install fisher"
      shell: "curl -sL https://git.io/fisher | source && fisher install jorgebucaran/fisher"
      args:
        executable: /bin/fish
